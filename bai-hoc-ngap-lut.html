<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Làm Sao? — Kỹ năng thích ứng khí hậu cho trẻ em ĐBSCL</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f3ff; }

    /* ── THEME (sync theo hero slide) ── */
    :root {
      --accent: #7c3aed; /* mặc định */
      --accent-2: #38bdf8; /* mặc định */
    }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(180deg, rgba(255,255,255,0.22), rgba(255,255,255,0.08));
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 0.5px solid rgba(255,255,255,0.35);
      box-shadow: 0 8px 28px rgba(0,0,0,0.05);
      padding: 0 32px;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
    }

    .logo { font-size: 20px; font-weight: 700; color: rgba(17,24,39,0.95); }
    .logo span { color: var(--accent); }
    .logo span { color: var(--accent); }
    .nav { display: flex; gap: 26px; align-items: center; }
    .nav a { font-size: 13px; color: #6b7280; text-decoration: none; cursor: pointer; }
    .nav a:hover { color: #8b5cf6; }
    .nav a.active { color: #8b5cf6; font-weight: 500; }
    .nav-cta {
      background: linear-gradient(135deg, #8b5cf6, #38bdf8);
      color: #fff !important; padding: 7px 18px; border-radius: 20px;
      font-size: 12px !important; font-weight: 600;
    }

    /* ── HERO ── */
    .hero { position: relative; min-height: 100vh; overflow: hidden; padding-bottom: 64px; }
    .slides { display: flex; transition: transform 0.5s cubic-bezier(.4,0,.2,1); width: 500%; }
    .slide {
      width: 20%;
      min-height: 100vh;
      position: relative;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 40px 48px;
    }

    /* Màu nền mỗi slide — chỉnh tại đây */
    .slide-1 { background: linear-gradient(145deg, #e0fdf4 0%, #d1fae5 40%, #ecfdf5 100%); }
    .slide-2 { background: linear-gradient(145deg, #fff7ed 0%, #fef3c7 40%, #fffbeb 100%); }
    .slide-3 { background: linear-gradient(145deg, #f5f3ff 0%, #ede9fe 40%, #faf5ff 100%); }
    .slide-4 { background: linear-gradient(145deg, #ecfeff 0%, #cffafe 40%, #f0fdfa 100%); }
    .slide-5 { background: linear-gradient(145deg, #fff1f2 0%, #ffe4e6 40%, #fdf2f8 100%); }

    .scene { position: absolute; inset: 0; pointer-events: none; }
    .orb { position: absolute; border-radius: 50%; filter: blur(70px); opacity: 0.5; }
    .grid-overlay {
      position: absolute; inset: 0;
      background-image: radial-gradient(circle, rgba(0,0,0,0.06) 1px, transparent 1px);
      background-size: 28px 28px; pointer-events: none;
    }

    .slide-visual {
      right: 8%;
      width: 300px;
      height: 300px;
    }

    /* Nội dung text mỗi slide */
    .slide-content { position: relative; z-index: 2; max-width: 480px; }
    .slide-tag {
      display: inline-block; font-size: 11px; font-weight: 600;
      letter-spacing: 1.4px; text-transform: uppercase;
      padding: 4px 12px; border-radius: 20px; margin-bottom: 14px;
    }
    .slide-title {
      font-size: 56px; font-weight: 700; line-height: 1.18;
      margin-bottom: 12px; letter-spacing: -0.8px;
    }
    .slide-title em { font-style: normal; }
    .slide-desc { font-size: 18px; line-height: 1.68; max-width: 500px; margin-bottom: 22px; }
    .slide-btn {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 16px; font-weight: 600;
      padding: 14px 28px; border-radius: 24px; border: none; cursor: pointer;
    }

    /* Màu sắc từng slide — chỉnh tại đây */
    .s1-tag { background: #d1fae5; color: #065f46; }
    .s1-title { color: #064e3b; }
    .s1-title em { color: #059669; }
    .s1-desc { color: #374151; }
    .s1-btn { background: #059669; color: #fff; }
    .orb-s1a { width:280px;height:280px;background:#6ee7b7;top:-80px;right:60px; }
    .orb-s1b { width:180px;height:180px;background:#a7f3d0;top:120px;right:260px; }

    .s2-tag { background: #fef3c7; color: #92400e; }
    .s2-title { color: #78350f; }
    .s2-title em { color: #d97706; }
    .s2-desc { color: #374151; }
    .s2-btn { background: #d97706; color: #fff; }
    .orb-s2a { width:300px;height:300px;background:#fde68a;top:-90px;right:40px; }
    .orb-s2b { width:160px;height:160px;background:#fcd34d;top:110px;right:280px; }

    .s3-tag { background: #ede9fe; color: #4c1d95; }
    .s3-title { color: #3b0764; }
    .s3-title em { color: #7c3aed; }
    .s3-desc { color: #374151; }
    .s3-btn { background: #7c3aed; color: #fff; }
    .orb-s3a { width:260px;height:260px;background:#c4b5fd;top:-60px;right:80px; }
    .orb-s3b { width:200px;height:200px;background:#ddd6fe;top:90px;right:250px; }

    .s4-tag { background: #cffafe; color: #164e63; }
    .s4-title { color: #083344; }
    .s4-title em { color: #0891b2; }
    .s4-desc { color: #374151; }
    .s4-btn { background: #0891b2; color: #fff; }
    .orb-s4a { width:290px;height:290px;background:#a5f3fc;top:-75px;right:55px; }
    .orb-s4b { width:170px;height:170px;background:#67e8f9;top:105px;right:275px; }

    .s5-tag { background: #ffe4e6; color: #881337; }
    .s5-title { color: #4c0519; }
    .s5-title em { color: #e11d48; }
    .s5-desc { color: #374151; }
    .s5-btn { background: #e11d48; color: #fff; }
    .orb-s5a { width:270px;height:270px;background:#fda4af;top:-65px;right:70px; }
    .orb-s5b { width:190px;height:190px;background:#fecdd3;top:95px;right:265px; }


    


    /* ── FOOTER ── */
    .footer-bar {
      background: #fff; border-top: 0.5px solid rgba(0,0,0,0.07);
      padding: 14px 32px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .footer-text { font-size: 11px; color: #9ca3af; }
    .footer-links { display: flex; gap: 20px; }
    .footer-links a { font-size: 11px; color: #9ca3af; text-decoration: none; }
    .footer-links a:hover { color: #7c3aed; }
  </style>
</head>
<body>

  <header class="header">
    <div class="logo">Làm <span>Sao?</span></div>
    <nav class="nav">
      <a href="lamsao.html" class="active">Trang chủ</a>

  <!-- ════ HERO CAROUSEL ════ -->
  <section class="hero">
    <div class="slides" id="slides">

      <!-- ── SLIDE 1: Ngập lụt ── -->
      <!-- Để thêm slide mới: copy từ đây đến thẻ đóng slide, dán sau slide cuối -->
      <!-- Nhớ đổi class: slide-1 → slide-6, s1-tag → s6-tag, v.v. -->

        </div>

            <rect x="58" y="38" width="44" height="32" rx="3" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>
            <line x1="80" y1="38" x2="80" y2="18" stroke="rgba(16,185,129,0.5)" stroke-width="1.5"/>
            <rect x="71" y="8" width="18" height="13" rx="2" fill="rgba(16,185,129,0.25)" stroke="rgba(16,185,129,0.7)" stroke-width="1"/>
            <rect x="28" y="78" width="22" height="32" rx="2" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.2)" stroke-width="0.5"/>
            <rect x="69" y="84" width="22" height="26" rx="2" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.2)" stroke-width="0.5"/>
            <rect x="110" y="78" width="20" height="32" rx="2" fill="rgba(16,185,129,0.08)" stroke="rgba(16,185,129,0.2)" stroke-width="0.5"/>
            <path d="M8 152 Q28 142 48 152 Q68 162 88 152 Q108 142 128 152 Q148 162 160 152 L160 190 L8 190Z" fill="rgba(52,211,153,0.3)"/>
            <path d="M8 162 Q38 150 68 162 Q98 174 128 162 Q145 156 160 162 L160 190 L8 190Z" fill="rgba(16,185,129,0.45)"/>
            <circle cx="50" cy="52" r="4" fill="rgba(245,158,11,1)"/>
            <circle cx="50" cy="52" r="8" fill="rgba(245,158,11,0.2)"/>

            <line x1="42" y1="52" x2="26" y2="52" stroke="rgba(245,158,11,0.7)" stroke-width="1.5"/>
          </svg>
        </div>

        <!-- Chỉnh nội dung text tại đây -->
        <div class="slide-content">
          <div class="slide-tag s1-tag">Chủ đề 1</div>
          <div class="slide-title s1-title">
            Khi nước<br>
            <em>dâng lên</em> —<br>
            bạn làm gì?
          </div>
          <div class="slide-desc s1-desc">
            Học cách ứng phó với ngập lụt trong từng gian nhà.
            Cầu dao ở đâu? Tắt điện khi nào? Đi đường nào an toàn?

      <!-- ── Kết thúc SLIDE 1 ── -->

    </div><!-- /slides -->

  <!-- ════ JAVASCRIPT ════ -->
  <script>
    // ── Biến số cần chỉnh khi thêm slide ──
    // Nếu thêm slide 6: đổi "totalSlides = 5" thành "totalSlides = 6"
    const totalSlides = 5;

    let current = 0;
    const slidesEl = document.getElementById('slides');
    const dots = document.querySelectorAll('.dot');
    const pills = document.querySelectorAll('.topic-pill');

    function goTo(n) {
      current = (n + totalSlides) % totalSlides;
      slidesEl.style.transform = `translateX(-${current * (100 / totalSlides)}%)`;

      dots.forEach((d, i) => d.classList.toggle('active', i === current));
      pills.forEach((p, i) => p.classList.toggle('active', i === current));

      // Sync màu theo topic-pill active để đồng bộ cả: topic-dot + dots trong hero
      const activePill = document.querySelector(`.topic-pill[data-i="${current}"]`);
      const activeDot = activePill ? activePill.querySelector('.topic-dot') : null;
      const dotBg = activeDot?.style?.background || '';

      const match = dotBg.match(/#([0-9a-fA-F]{3,6})/);
      if (match) {
        const accent = `#${match[1]}`;
        document.documentElement.style.setProperty('--accent', accent);
        document.documentElement.style.setProperty('--accent-2', '#38bdf8');

        // Đổi màu dot điều hướng trong hero theo accent
        dots.forEach((d, i) => {
          if (i === current) {
            d.style.background = accent;
          } else {
            d.style.background = 'rgba(0,0,0,0.18)';
          }
        });
      }
    }


    document.getElementById('prev').onclick = () => goTo(current - 1);
    document.getElementById('next').onclick = () => goTo(current + 1);
    dots.forEach(d => d.onclick = () => goTo(+d.dataset.i));
    pills.forEach((p, i) => p.onclick = () => goTo(i));

    // Tự động chuyển slide mỗi 4 giây
    let timer = setInterval(() => goTo(current + 1), 4000);
    const heroEl = document.querySelector('.hero');
    heroEl.addEventListener('mouseenter', () => clearInterval(timer));
    heroEl.addEventListener('mouseleave', () => {
      timer = setInterval(() => goTo(current + 1), 4000);
    });
  </script>

</body>
